<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnonChat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- PROFILE SETUP MODAL -->
<div id="setupModal" class="modal">
  <div class="modal-box">
    <h2>👤 Create Your Profile</h2>
    <div class="avatar-upload">
      <img id="previewPic" src="https://ui-avatars.com/api/?name=You&background=4f46e5&color=fff&size=100" />
      <label for="picInput">📷 Upload Photo</label>
      <input type="file" id="picInput" accept="image/*" onchange="previewPhoto(event)" />
    </div>
    <input id="firstName" type="text" placeholder="First Name" />
    <input id="lastName" type="text" placeholder="Last Name" />
    <button onclick="saveProfile()">Save & Continue →</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="container" style="display:none">
  <div class="profile-bar">
    <img id="myPic" class="avatar-sm" />
    <div>
      <div id="myName" class="bold"></div>
      <div id="myCode" class="code-text"></div>
    </div>
    <button class="copy-btn" onclick="copyCode()">📋 Copy Code</button>
  </div>

  <div class="card">
    <p>🔍 Search a friend by <b>name</b> or <b>code</b>:</p>
    <input id="searchInput" type="text" placeholder="Type name or code..." oninput="searchUsers()" />
    <div id="searchResults"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
